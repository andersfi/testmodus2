      color: '#1a4a6e', weight: 2.5, opacity: 0.8,
      fillColor: '#1a4a6e', fillOpacity: 0.04, dashArray: '5,4'
    }
  }).addTo(map);

  // Populate dropdown
  const select = document.getElementById('species-select');
  gbifData.forEach((sp, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${sp.no} / ${sp.en} (${sp.sci})`;
    select.appendChild(opt);
  });

  let currentLayer = null;

  function makeAbsentIcon() {
    return L.divIcon({
      html: '<div class="absent-icon">✕</div>',
      className: '',
      iconSize: [18, 18],
      iconAnchor: [9, 9],
      popupAnchor: [0, -10]
    });
  }

  function showSpecies(idx) {
    if (currentLayer) { map.removeLayer(currentLayer); currentLayer = null; }
    const sp = gbifData[idx];
    const color = COLORS[idx % COLORS.length];
    const occ = sp.occurrences;

    const present = occ.filter(r => r.status !== 'ABSENT').length;
    const absent  = occ.filter(r => r.status === 'ABSENT').length;

    document.getElementById('panel-no').textContent = sp.no;
    document.getElementById('panel-en').textContent = sp.en;
    document.getElementById('panel-sci').textContent = sp.sci;
    document.getElementById('panel-count').textContent =
      `${present} tilstede · ${absent} fraværende`;
    document.getElementById('legend-dot').style.background = color;

    if (!occ.length) return;

    const absentIcon = makeAbsentIcon();
    const markers = L.featureGroup();

    occ.forEach(rec => {
      const isAbsent = rec.status === 'ABSENT';
      const popupLines = [
        `<strong style="color:${isAbsent ? '#e74c3c' : color}">${sp.no}</strong>` +
          (isAbsent ? ' <span style="color:#e74c3c">(ABSENT)</span>' : ''),
        `<em>${sp.sci}</em>`,
        rec.year       ? `År: ${rec.year}` : '',
        rec.municipality ? `Kommune: ${rec.municipality}` : '',
        rec.locality   ? `Lokalitet: ${rec.locality}` : '',
        rec.gbifID     ? `<a href="https://www.gbif.org/occurrence/${rec.gbifID}" target="_blank">GBIF-post →</a>` : ''
      ].filter(Boolean).join('<br>');

      let marker;
      if (isAbsent) {
        marker = L.marker([rec.lat, rec.lon], { icon: absentIcon });
      } else {
        marker = L.circleMarker([rec.lat, rec.lon], {
          radius: 7,
          fillColor: color,
          color: 'white',
          weight: 1.5,
          opacity: 1,
          fillOpacity: 0.75
        });
      }
      marker.bindPopup(popupLines);
      markers.addLayer(marker);
    });

    markers.addTo(map);
    currentLayer = markers;
  }

  select.addEventListener('change', e => showSpecies(parseInt(e.target.value)));
  showSpecies(0);
  </script>
</body>
</html>
