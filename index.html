        `<strong style="color:${color}">${sp.no}</strong>`,
        `<em>${sp.sci}</em>`,
        rec.year ? `År: ${rec.year}` : '',
        rec.municipality ? `Kommune: ${rec.municipality}` : '',
        rec.locality ? `Lokalitet: ${rec.locality}` : '',
        rec.gbifID ? `<a href="https://www.gbif.org/occurrence/${rec.gbifID}" target="_blank">GBIF-post →</a>` : ''
      ].filter(Boolean).join('<br>');
      circle.bindPopup(popupLines);
      markers.addLayer(circle);
    });

    markers.addTo(map);
    currentLayer = markers;
  }

  select.addEventListener('change', e => showSpecies(parseInt(e.target.value)));
  showSpecies(0);
  </script>
</body>
</html>
